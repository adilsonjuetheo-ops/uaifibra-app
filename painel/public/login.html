<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UaiFibra Painel — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #FF6A00;
      --primary-dark: #C85400;
      --secondary:    #1E3A8A;
      --bg:           #0d0d0d;
      --surface:      #1a1a1a;
      --elevated:     #242424;
      --border:       #2a2a2a;
      --text:         #ffffff;
      --muted:        #a0a0a0;
      --danger:       #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    .logo-wrap h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .logo-wrap p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: var(--primary); }

    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }

    .btn:hover  { background: var(--primary-dark); }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .erro {
      color: var(--danger);
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/logo.png" alt="UaiFibra" class="logo-img" />
      <h1>UaiFibra Painel</h1>
      <p>Área administrativa restrita</p>
    </div>

    <div class="field">
      <label for="usuario">Usuário</label>
      <input id="usuario" type="text" placeholder="admin" autocomplete="username" />
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <p class="erro" id="erro"></p>

    <button class="btn" id="btn-entrar">Entrar</button>
  </div>

  <script>
    if (localStorage.getItem('painel_token')) location.href = '/';

    async function entrar() {
      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value;
      const erro    = document.getElementById('erro');
      const btn     = document.getElementById('btn-entrar');

      erro.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, senha }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Falha no login');
        localStorage.setItem('painel_token', data.token);
        localStorage.setItem('painel_usuario', data.usuario);
        location.href = '/';
      } catch (e) {
        erro.textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    document.getElementById('btn-entrar').addEventListener('click', entrar);
    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') entrar();
    });
  </script>
</body>
</html>
