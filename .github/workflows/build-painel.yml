name: Build & Push Painel Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'painel/**'
      - '.github/workflows/build-painel.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/uaifibra-painel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./painel
          file: ./painel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/uaifibra-painel \
            -f visibility=public && echo "Package set to public" || echo "Visibility change skipped (may already be public)"

      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://coolify.adilsondev.com.br/api/v1/deploy?uuid=vr2gcsp0fqz3r0u6xgyz64bh&force=true" | \
            jq '.deployments[0].message // .'
